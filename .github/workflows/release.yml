name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref of UIkit to release
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/re-lint.yml
    secrets: inherit

  test:
    name: Test
    uses: ./.github/workflows/re-test.yml
    secrets: inherit

  visual:
    name: Visual
    needs: [lint, test]
    uses: ./.github/workflows/re-visual.yml
    secrets: inherit

  build:
    name: Build
    needs: [lint, test, visual]
    uses: ./.github/workflows/re-build.yml
    with:
      upload-artifacts: true
    secrets: inherit

  publish-cdn:
    name: Publish to freeCodeCamp/cdn
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UIkit at ${{ inputs.ref }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          path: uikit

      - name: Download CDN bundle artefact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist-cdn
          path: uikit/dist-cdn/

      - name: Read UIkit version
        id: version
        working-directory: uikit
        run: echo "value=$(node -p 'require(\"./packages/uikit/package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Validate version is semver x.y.z
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::packages/uikit/package.json version must be a full semver x.y.z value, got '$VERSION'"
            exit 1
          fi

      - name: Checkout cdn repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: freeCodeCamp/cdn
          token: ${{ secrets.CDN_PUSH_TOKEN }}
          path: cdn
          fetch-depth: 1

      - name: Warn if version already published
        id: republish_check
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if [ -d "cdn/build/uikit/${VERSION}" ]; then
            echo "republished=true" >> "$GITHUB_OUTPUT"
            echo "::warning title=Republishing same version::uikit v${VERSION} already exists at freeCodeCamp/cdn:build/uikit/${VERSION}/. This run will overwrite it in place. Bump package.json if this was not intended."
          else
            echo "republished=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync uikit bundle into cdn/build/uikit
        run: |
          mkdir -p cdn/build/uikit
          rsync -a --delete uikit/dist-cdn/uikit/ cdn/build/uikit/

      - name: Open PR on cdn
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          path: cdn
          token: ${{ secrets.CDN_PUSH_TOKEN }}
          branch: release/uikit-v${{ steps.version.outputs.value }}
          base: main
          commit-message: 'chore(uikit): publish v${{ steps.version.outputs.value }}'
          title: 'chore(uikit): publish v${{ steps.version.outputs.value }}'
          body: |
            Automated publish of `fcc-uikit` v${{ steps.version.outputs.value }}
            from `freeCodeCamp/UIkit@${{ inputs.ref }}`.

            Updates `build/uikit/` with the rolling bundle plus the versioned
            aliases (`latest/`, `<major>/`, `<major>.<minor>/`, `<version>/`).
          delete-branch: true
          signoff: true

      - name: Write release summary
        env:
          VERSION: ${{ steps.version.outputs.value }}
          REPUBLISHED: ${{ steps.republish_check.outputs.republished }}
          REF: ${{ inputs.ref }}
        run: |
          {
            echo "## Release dispatched"
            echo
            echo "- UIkit ref: \`${REF}\`"
            echo "- UIkit version: \`v${VERSION}\`"
            echo "- Target: freeCodeCamp/cdn branch \`release/uikit-v${VERSION}\`"
            if [ "${REPUBLISHED}" = "true" ]; then
              echo "- :warning: **Republishing**: v${VERSION} already exists at \`build/uikit/${VERSION}/\` in \`freeCodeCamp/cdn\`. The PR overwrites it in place."
            fi
            echo "- Next step: review and merge the PR opened on \`freeCodeCamp/cdn\`."
          } >> "$GITHUB_STEP_SUMMARY"
