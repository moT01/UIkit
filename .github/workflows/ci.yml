name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/re-lint.yml
    secrets: inherit

  test:
    name: Test
    uses: ./.github/workflows/re-test.yml
    secrets: inherit

  build:
    name: Build
    needs: [lint, test]
    uses: ./.github/workflows/re-build.yml
    secrets: inherit

  visual:
    name: Visual
    needs: [lint, test]
    uses: ./.github/workflows/re-visual.yml
    secrets: inherit
