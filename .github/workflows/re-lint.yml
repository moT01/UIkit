name: Lint

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  lint:
    name: Format + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: actionlint
        # Catch workflow-drift before merge. Image-pin to v1.7.12 (matches the
        # version maintainers run locally via Homebrew).
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck
